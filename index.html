<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
</head>
<body class="bg-slate-50 pb-20 font-['Kanit']">

<div id="app">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-indigo-600">MISSION COMPLETED!</h1>
            <p class="text-[10px] text-gray-400" v-if="me">Login: {{ me.email }}</p>
        </div>
        <div v-if="me" class="text-right">
            <span class="block text-[10px] text-gray-500 uppercase">Token คงเหลือ</span>
            <span class="text-xl font-bold text-orange-500">{{ me.tokens }}</span>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4">
        
        <!-- Tab: FEED -->
        <div v-if="activeTab === 'feed'" class="space-y-4">
            <h2 class="font-bold text-gray-700">กิจกรรมการโหวตล่าสุด 🤫</h2>
            <div v-for="log in logs" class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-indigo-500">
                <p class="text-sm text-gray-600">
                    <span class="font-bold text-gray-400 italic">ผู้ใช้ท่านหนึ่ง</span> 
                    ส่งคำชมให้คุณ <span class="text-indigo-600 font-bold">{{ log.receiver }}</span>
                </p>
                <p class="mt-2 text-gray-800 text-sm bg-gray-50 p-2 rounded-lg">"{{ log.message }}"</p>
                <div class="mt-2 text-right">
                    <span class="text-xs font-bold bg-orange-100 text-orange-600 px-2 py-0.5 rounded text-[10px]">
                        {{ log.points }} Token
                    </span>
                </div>
            </div>
        </div>

        <!-- Tab: VOTE -->
        <div v-if="activeTab === 'vote'" class="space-y-4">
            <h2 class="font-bold text-gray-800 text-center">ใช้ Token ชมเชยเพื่อน</h2>
            <div class="bg-white p-6 rounded-3xl shadow-lg space-y-5">
                <div>
                    <label class="text-xs text-gray-400">ส่งถึงใคร?</label>
                    <select v-model="form.receiverName" class="w-full p-3 bg-slate-50 rounded-xl outline-none">
                        <option value="">เลือกรายชื่อเพื่อน</option>
                        <option v-for="u in users" v-show="u.name !== me.name" :value="u.name">{{u.name}}</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400">ข้อความชื่นชม</label>
                    <textarea v-model="form.message" class="w-full p-3 bg-slate-50 rounded-xl outline-none" rows="3" placeholder="พิมพ์สิ่งที่คุณประทับใจ..."></textarea>
                </div>
                <div>
                    <label class="text-xs text-gray-400 font-bold">จำนวน Token ที่ต้องการให้ (สูงสุด {{ me.tokens }})</label>
                    <input type="number" v-model.number="form.points" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-xl font-bold text-orange-500">
                </div>
                <button @click="submit" :disabled="submitting || me.tokens <= 0" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition">
                    {{ submitting ? 'กำลังประมวลผล...' : 'ยืนยันการใช้ Token' }}
                </button>
            </div>
        </div>

        <!-- Tab: RANK -->
        <div v-if="activeTab === 'rank'" class="space-y-4">
            <h2 class="font-bold text-gray-800 text-center italic">พนักงานที่ได้รับคะแนนโหวตสูงสุด</h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                <div v-for="(u, i) in sortedUsers" class="flex items-center justify-between p-4 border-b">
                    <div class="flex items-center">
                        <span class="w-8 text-gray-300 font-bold italic">{{ i+1 }}</span>
                        <span class="font-medium">{{ u.name }}</span>
                    </div>
                    <span class="font-bold text-indigo-600">{{ u.points }}</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button @click="activeTab = 'feed'" :class="activeTab==='feed'?'text-indigo-600':'text-gray-300'" class="text-center flex-1">
            <i class="block text-xl mb-1">💬</i><span class="text-[10px]">ฟีด</span>
        </button>
        <button @click="activeTab = 'vote'" :class="activeTab==='vote'?'text-indigo-600':'text-gray-300'" class="text-center flex-1">
            <i class="block text-xl mb-1">✨</i><span class="text-[10px]">โหวต</span>
        </button>
        <button @click="activeTab = 'rank'" :class="activeTab==='rank'?'text-indigo-600':'text-gray-300'" class="text-center flex-1">
            <i class="block text-xl mb-1">🏆</i><span class="text-[10px]">อันดับ</span>
        </button>
    </nav>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxprPVYNeqTfN7J7iLKxRqsxzwZbgXg9w0_qhcEo_2UQp-4TfiFv-kEhbzanWE1Bdw/exec';

    const { createApp, ref, onMounted, computed } = Vue
    createApp({
        setup() {
            const me = ref(null);
            const users = ref([]);
            const logs = ref([]);
            const activeTab = ref('feed');
            const submitting = ref(false);
            const form = ref({ receiverName: '', message: '', points: 1 });

            const fetchData = async () => {
                const res = await fetch(API_URL);
                const data = await res.json();
                me.value = data.currentUser;
                users.value = data.users;
                logs.value = data.logs;
            };

            const submit = async () => {
                if(!form.value.receiverName || !form.value.message || form.value.points < 1) return alert('กรุณาระบุข้อมูลให้ครบ');
                if(form.value.points > me.value.tokens) return alert('Token ของคุณไม่พอ');

                submitting.value = true;
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(form.value)
                    });
                    alert('ส่งความชื่นชมเรียบร้อย!');
                    form.value = { receiverName: '', message: '', points: 1 };
                    await fetchData();
                    activeTab.value = 'feed';
                } catch (e) { 
                    // เนื่องจาก GAS อาจมีปัญหาเรื่อง CORS แต่ข้อมูลเข้า ให้ลองโหลดใหม่
                    setTimeout(fetchData, 2000); 
                    activeTab.value = 'feed';
                } finally { submitting.value = false; }
            };

            const sortedUsers = computed(() => [...users.value].sort((a,b) => b.points - a.points));

            onMounted(fetchData);
            return { me, users, logs, activeTab, form, submit, sortedUsers, submitting }
        }
    }).mount('#app')
</script>
</body>
</html>
